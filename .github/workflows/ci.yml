name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install plink2 and bcftools for sex-chromosome QC tests
        run: |
          # Install bcftools from apt
          sudo apt-get install -y --no-install-recommends bcftools unzip
          # Install plink2 from pinned GitHub release (matches Dockerfile pin)
          PLINK2_VERSION="v2.0.0-a.6.33"
          PLINK2_URL="https://github.com/chrchang/plink-ng/releases/download/${PLINK2_VERSION}/plink2_linux_x86_64.zip"
          curl -fsSL "${PLINK2_URL}" -o /tmp/plink2.zip
          sudo unzip -o /tmp/plink2.zip plink2 -d /usr/local/bin/
          sudo chmod +x /usr/local/bin/plink2
          rm /tmp/plink2.zip
          command -v plink2 >/dev/null
          command -v bcftools >/dev/null
          plink2 --version | head -1
          bcftools --version | head -1

      - name: Install Python test dependencies
        run: python3 -m pip install --upgrade pip "numpy<1.25"

      - name: Shell syntax and lint checks
        run: bash tests/test_shell_syntax.sh

      - name: Script help output tests
        run: bash tests/test_scripts_help.sh

      - name: Run integration and regression test suite
        run: |
          bash tests/test_resource_links.sh
          bash tests/test_generate_report.sh
          bash tests/test_compute_sample_qc.sh
          bash tests/test_autosome_filter_targets.sh
          bash tests/test_temp_dir_scoping.sh
          bash tests/test_sample_name_map.sh
          bash tests/test_realign_manifest.sh
          bash tests/test_ancestry_pca_projection.sh
          bash tests/test_qc_filtering.sh
          bash tests/test_recluster_welford.sh
          REQUIRE_PLINK2=1 REQUIRE_BCFTOOLS=1 bash tests/test_plink2_sex_chr.sh
