# cromwell_apptainer.conf
#
# Cromwell backend configuration for running the pipeline with Apptainer
# (formerly Singularity) on HPC or local systems.
#
# Usage: pass as a JVM argument before the JAR:
#   java -Dconfig.file=wdl/cromwell_apptainer.conf \
#     -jar cromwell-*.jar run \
#     wdl/illumina_idat_processing.wdl \
#     --inputs inputs.json
#
# For SLURM or other HPC schedulers, see:
#   https://cromwell.readthedocs.io/en/stable/backends/HPC/

include required(classpath("application"))

backend {
  default = "Local"
  providers {
    Local {
      actor-factory = "cromwell.backend.impl.sfs.config.ConfigBackendLifecycleActorFactory"
      config {
        run-in-background = true

        runtime-attributes = """
          String docker = "ghcr.io/jlanej/illumina_idat_processing:main"
          Int    cpu       = 4
          Float  memory    = 32.0
          Int    disk_size = 500
        """

        # Use apptainer (or singularity) to run the container image.
        # If only singularity is installed, replace 'apptainer' with 'singularity'.
        submit-docker = """
          apptainer exec \
            --bind ${cwd}:${docker_cwd} \
            docker://${docker} \
            ${job_shell} ${script}
        """
      }
    }
  }
}

call-caching.enabled = false
